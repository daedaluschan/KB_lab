name: Deploy MkDocs to GitHub Pages

on:
  push:
    branches:
      - main
      - master
      - work
  workflow_dispatch:

permissions:
  contents: read
  actions: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

env:
  # Opt JavaScript actions into Node.js 24 now so the workflow does not emit
  # Node.js 20 deprecation warnings as GitHub Actions changes defaults in 2026.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build site
        run: mkdocs build --strict

      - name: Package Pages artifact
        run: |
          tar \
            --dereference \
            --hard-dereference \
            --directory site \
            -cvf "$RUNNER_TEMP/pages.tar" \
            .
          gzip --best --force "$RUNNER_TEMP/pages.tar"
          mv "$RUNNER_TEMP/pages.tar.gz" "$RUNNER_TEMP/github-pages"

      - name: Upload Pages artifact
        uses: actions/upload-artifact@v7
        with:
          path: ${{ runner.temp }}/github-pages
          archive: false
          retention-days: 1
          if-no-files-found: error

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
